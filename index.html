<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mangalmurti Clinic | Elegant Case Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f4efe6;
    font-family: 'Inter', sans-serif;
    color: #1e2a25;
    scroll-behavior: smooth;
  }

  :root {
    --deep-teal: #1a4a3f;
    --gold-accent: #c17f3a;
    --gold-light: #e6c394;
    --sand: #f9f6ef;
    --warm-gray: #ece4d7;
    --ink: #2c2c28;
    --muted-text: #6b5e4f;
    --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08);
    --border-soft: #e2d8cb;
  }

  .clinic-header {
    background: var(--deep-teal);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 18px rgba(0, 0, 0, 0.1);
  }
  .header-container {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-icon {
    background: linear-gradient(145deg, var(--gold-accent), #b46f2a);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .brand-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: white;
    line-height: 1.2;
  }
  .brand-text p {
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: rgba(255, 245, 225, 0.85);
    text-transform: uppercase;
  }
  .progress-area {
    min-width: 180px;
  }
  .progress-track {
    background: rgba(255, 248, 235, 0.2);
    border-radius: 30px;
    height: 6px;
    width: 100%;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--gold-light), var(--gold-accent));
    width: 0%;
    height: 6px;
    border-radius: 30px;
    transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }
  .step-label {
    font-size: 0.7rem;
    text-align: right;
    color: #e9ddce;
    margin-top: 6px;
    font-weight: 500;
  }

  .step-tabs {
    background: white;
    border-bottom: 1px solid var(--border-soft);
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .step-tabs-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    padding: 0 20px;
    gap: 4px;
  }
  .step-tab {
    background: none;
    border: none;
    padding: 14px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    color: #7f6e5c;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .step-tab .step-number {
    width: 24px;
    height: 24px;
    background: #e8dfd4;
    border-radius: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: bold;
    color: #5e4e3c;
    transition: all 0.2s;
  }
  .step-tab.active {
    color: var(--deep-teal);
    border-bottom-color: var(--gold-accent);
  }
  .step-tab.active .step-number {
    background: var(--deep-teal);
    color: white;
  }
  .step-tab.completed .step-number {
    background: var(--gold-accent);
    color: white;
  }
  .step-tab.completed {
    color: #a47c45;
  }

  .main-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 28px 70px;
  }
  .step-panel {
    display: none;
    animation: fadeSlide 0.35s ease-out;
  }
  .step-panel.active-panel {
    display: block;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .step-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--deep-teal);
    margin-bottom: 0.4rem;
  }
  .step-sub {
    color: var(--muted-text);
    font-size: 0.85rem;
    margin-bottom: 2rem;
    border-left: 3px solid var(--gold-light);
    padding-left: 12px;
  }

  .clinic-card {
    background: white;
    border-radius: 24px;
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow-sm);
    padding: 32px 36px;
    margin-bottom: 28px;
    transition: box-shadow 0.2s;
  }
  .clinic-card:hover {
    box-shadow: var(--shadow-md);
  }
  .card-header-flex {
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1.5px solid var(--warm-gray);
    margin-bottom: 28px;
    padding-bottom: 16px;
  }
  .card-icon {
    background: #f3ede5;
    width: 48px;
    height: 48px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    color: var(--gold-accent);
  }
  .card-header-flex h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--deep-teal);
  }
  .card-header-flex p {
    font-size: 0.7rem;
    color: var(--muted-text);
    letter-spacing: 0.3px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }
  .full-width {
    grid-column: span 2;
  }
  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field-tag {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted-text);
  }
  input, select, textarea {
    border: 1.5px solid #e7dfd4;
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    background: #ffffff;
    transition: all 0.2s;
    width: 100%;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold-accent);
    box-shadow: 0 0 0 3px rgba(193, 127, 58, 0.1);
  }
  textarea {
    resize: vertical;
  }
  .radio-group-modern {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 6px;
  }
  .radio-label {
    background: #fbf8f3;
    border: 1.5px solid #e2d8cb;
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .radio-label input {
    width: 16px;
    height: 16px;
    accent-color: var(--gold-accent);
  }
  .radio-label:has(input:checked) {
    background: #fff1e3;
    border-color: var(--gold-accent);
    color: #8b5a2b;
    font-weight: 500;
  }

  .modality-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .modality-pill {
    background: #fcf9f4;
    border: 1px solid #e3d9ce;
    border-radius: 40px;
    padding: 6px 12px;
    font-size: 0.75rem;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .modality-pill .mod-name {
    font-weight: 500;
    color: #2c4a3b;
  }
  .mod-options {
    display: inline-flex;
    gap: 6px;
  }
  .mod-badge {
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 30px;
    font-size: 0.65rem;
    font-weight: 500;
    background: white;
    border: 1px solid #cfc3b4;
    transition: all 0.1s;
  }
  .selected-better { background: #dff0e9; border-color: #2c7a5a; color: #1c5e44; }
  .selected-worse { background: #ffe6e5; border-color: #c75c4a; color: #9b3a2a; }
  .selected-neutral { background: #fff0db; border-color: #d9a13b; color: #8b5e1c; }

  .food-table-wrapper {
    overflow-x: auto;
  }
  .food-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .food-table th {
    text-align: center;
    background: #f5efe7;
    padding: 12px 6px;
    font-weight: 600;
    color: #5b4c38;
  }
  .food-table td {
    border-bottom: 1px solid #ece1d4;
    padding: 10px 6px;
    text-align: center;
  }
  .food-table td:first-child {
    text-align: left;
    font-weight: 500;
  }
  .food-table input {
    width: 18px;
    height: 18px;
    accent-color: var(--gold-accent);
  }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    gap: 16px;
  }
  .btn {
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.2s;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid #cdbfaf;
    color: #5e4e3c;
  }
  .btn-outline:hover {
    border-color: var(--gold-accent);
    background: #fffaf3;
  }
  .btn-primary {
    background: var(--deep-teal);
    color: white;
    box-shadow: 0 4px 10px rgba(26, 74, 63, 0.2);
  }
  .btn-primary:hover {
    background: #226454;
    transform: translateY(-1px);
  }
  .btn-gold {
    background: linear-gradient(135deg, #c17f3a, #dba459);
    color: white;
    box-shadow: 0 6px 12px rgba(193, 127, 58, 0.25);
  }

  .summary-glass {
    background: #fefcf8;
    border-radius: 28px;
    padding: 28px;
    max-height: 500px;
    overflow-y: auto;
    font-size: 0.8rem;
  }
  .summary-item {
    margin-bottom: 16px;
    border-left: 3px solid var(--gold-light);
    padding-left: 14px;
  }
  .summary-item strong {
    color: var(--deep-teal);
    font-size: 0.75rem;
    text-transform: uppercase;
  }
  .success-icon {
    text-align: center;
    margin: 20px 0;
  }
  @media (max-width: 720px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
    .clinic-card { padding: 20px; }
    .main-container { padding: 20px 16px; }
    .step-heading { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<header class="clinic-header">
  <div class="header-container">
    <div class="brand">
      <div class="brand-icon">M</div>
      <div class="brand-text">
        <h1>Mangalmurti Clinic</h1>
        <p>Dr. Bhakti Patil · Homeopathic case record</p>
      </div>
    </div>
    <div class="progress-area">
      <div class="progress-track"><div class="progress-fill" id="globalProgress"></div></div>
      <div class="step-label" id="stepCounter">Step 1 of 7</div>
    </div>
  </div>
</header>

<nav class="step-tabs">
  <div class="step-tabs-inner" id="stepTabsContainer"></div>
</nav>

<main class="main-container">
  <form id="masterForm" onsubmit="return false;">
    <div id="panelsContainer"></div>
  </form>
</main>

<script>
  // Global variables
  let currentStepIdx = 0;

  // Modality datasets
  const modalityCategories = {
    'Weather & Environment': ['Hot weather', 'Cold weather', 'Rainy weather', 'Cloudy weather', 'Change of season', 'Thunderstorm', 'Warm bath', 'Cold bathing', 'Sun', 'Draft air'],
    'Position & Movement': ['Covering', 'Lying with head low', 'Sitting', 'Standing', 'Stooping', 'Hanging limbs', 'Raising arms', 'Stretching'],
    'Senses & Stimuli': ['Noise', 'Sudden noise', 'Music', 'Light', 'Strong smells', 'Touch', 'Pressure', 'Massage', 'Tight clothes'],
    'Bodily Functions': ['When constipated', 'Before urine', 'During urine', 'After urine', 'Before menses', 'During menses', 'After menses', 'After sweating', 'When fasting', 'Coughing', 'Sneezing', 'Belching'],
    'Sleep & Activity': ['Before sleep', 'During sleep', 'After sleep', 'Loss of sleep', 'After eating', 'Over eating', 'Physical exertion', 'Reading', 'Talking'],
    'Emotions & Mind': ['When angry', 'When worried', 'When sad', 'After weeping', 'In a crowd', 'When alone', 'In company', 'Consolation'],
    'Time & Misc': ['Morning', 'Afternoon', 'Evening', 'Night', 'Bathing', 'Before stools', 'During stools', 'After stools']
  };
  
  const allModalityItems = Object.values(modalityCategories).flat();
  const foodItems = ['Bitter', 'Salt extra', 'Sweet', 'Sour', 'Bread', 'Butter', 'Fats', 'Milk', 'Coffee', 'Mud / Chalk', 'Eggs', 'Spicy food', 'Meat', 'Fish', 'Cabbage', 'Onions', 'Warm food / drink', 'Cold food / drink', 'Fruits', 'Anything else'];

  // Storage functions
  function saveModalityValue(item, value) {
    localStorage.setItem(`mod_${item.replace(/\s/g, '_')}`, value);
  }
  
  function getModalityValue(item) {
    return localStorage.getItem(`mod_${item.replace(/\s/g, '_')}`) || '';
  }
  
  function saveField(id, value) {
    if (id) localStorage.setItem(`field_${id}`, value);
  }
  
  function getField(id) {
    return localStorage.getItem(`field_${id}`) || '';
  }

  function gatherAllData() {
    let data = {};
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.id && (el.type === 'text' || el.type === 'number' || el.type === 'email' || el.type === 'tel' || el.tagName === 'TEXTAREA')) {
        data[el.id] = el.value;
      } else if (el.type === 'checkbox' && el.id) {
        data[el.id] = el.checked;
      } else if (el.type === 'radio' && el.checked && el.name) {
        data[el.name] = el.value;
      }
    });
    
    allModalityItems.forEach(item => {
      let val = getModalityValue(item);
      if (val) data[`mod_${item.replace(/\s/g, '_')}`] = val;
    });
    return data;
  }

  function populateFromStorage() {
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.id) {
        let stored = getField(el.id);
        if (stored && (el.type === 'text' || el.type === 'number' || el.type === 'email' || el.type === 'tel' || el.tagName === 'TEXTAREA')) {
          el.value = stored;
        } else if (el.type === 'checkbox' && el.id) {
          el.checked = (stored === 'true');
        }
      }
    });
    
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
      if (radio.name && getField(radio.name) === radio.value) radio.checked = true;
    });
  }

  function attachSaveEvents() {
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.id) {
        el.addEventListener('input', () => { 
          saveField(el.id, el.type === 'checkbox' ? el.checked : el.value); 
        });
      }
      if (el.type === 'radio' && el.name) {
        el.addEventListener('change', () => { 
          if (el.checked) saveField(el.name, el.value); 
        });
      }
    });
  }

  // Navigation function - FIXED
  function goToStep(step) {
    if (step < 0) step = 0;
    if (step > 6) step = 6;
    
    // Hide all panels
    document.querySelectorAll('.step-panel').forEach(panel => {
      panel.classList.remove('active-panel');
    });
    
    // Show selected panel
    const targetPanel = document.getElementById(`panel_${step}`);
    if (targetPanel) {
      targetPanel.classList.add('active-panel');
    }
    
    currentStepIdx = step;
    updateProgress();
    updateTabs();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
    if (step === 6) buildEnhancedSummary();
  }

  function updateProgress() {
    let percent = ((currentStepIdx + 1) / 7) * 100;
    const progressBar = document.getElementById('globalProgress');
    if (progressBar) progressBar.style.width = percent + '%';
    const stepCounter = document.getElementById('stepCounter');
    if (stepCounter) stepCounter.innerText = `Step ${currentStepIdx + 1} of 7`;
  }

  function updateTabs() {
    const tabs = document.querySelectorAll('.step-tab');
    tabs.forEach((tab, idx) => {
      if (idx < currentStepIdx) {
        tab.classList.add('completed');
      } else {
        tab.classList.remove('completed');
      }
      if (idx === currentStepIdx) {
        tab.classList.add('active');
      } else {
        tab.classList.remove('active');
      }
    });
  }

  function buildEnhancedSummary() {
    const data = gatherAllData();
    const summaryDiv = document.getElementById('summaryDetailed');
    if (!summaryDiv) return;
    
    let html = `<div class="summary-glass">`;
    html += `<div class="success-icon">📋 Complete case abstract</div>`;
    if (data.p_name) html += `<div class="summary-item"><strong>Patient</strong><br/>${data.p_name} | Age ${data.p_age || '-'} | Gender ${data.p_gender || '-'}</div>`;
    if (data.c_chief) html += `<div class="summary-item"><strong>Chief complaint</strong><br/>${data.c_chief.substring(0, 180)}${data.c_chief.length > 180 ? '…' : ''}</div>`;
    if (data.m_personality) html += `<div class="summary-item"><strong>Personality</strong><br/>${data.m_personality.substring(0, 120)}</div>`;
    
    const betterList = [], worseList = [];
    allModalityItems.forEach(it => {
      let val = getModalityValue(it);
      if (val === 'Better') betterList.push(it);
      if (val === 'Worse') worseList.push(it);
    });
    
    if (betterList.length) html += `<div class="summary-item"><strong>🌿 Better from</strong><br/>${betterList.slice(0, 8).join(', ')}${betterList.length > 8 ? ' …' : ''}</div>`;
    if (worseList.length) html += `<div class="summary-item"><strong>⚠️ Worse from</strong><br/>${worseList.slice(0, 8).join(', ')}${worseList.length > 8 ? ' …' : ''}</div>`;
    html += `</div>`;
    summaryDiv.innerHTML = html;
  }

  // Render modality panel
  function renderModalityPanel() {
    let modalHtml = `<div class="clinic-card"><div class="card-header-flex"><div class="card-icon">🌡️</div><div><h2>Factors that modify</h2><p>Select better / worse / neutral</p></div></div>`;
    
    for (let [cat, items] of Object.entries(modalityCategories)) {
      modalHtml += `<div style="margin-bottom: 28px;"><h3 style="font-size:0.9rem; margin-bottom: 10px; color:#4c6b5e;">${cat}</h3><div class="modality-grid">`;
      
      items.forEach(item => {
        const saved = getModalityValue(item);
        modalHtml += `<div class="modality-pill"><span class="mod-name">${item}</span><div class="mod-options">`;
        
        ['Better', 'Worse', 'No effect'].forEach(opt => {
          let cls = '';
          if (saved === opt) {
            cls = `selected-${opt.toLowerCase().replace(' ', '')}`;
          }
          const icon = opt === 'No effect' ? '⚪' : (opt === 'Better' ? '✓' : '✗');
          modalHtml += `<span class="mod-badge ${cls}" data-moditem="${item}" data-modval="${opt}">${icon} ${opt}</span>`;
        });
        modalHtml += `</div></div>`;
      });
      modalHtml += `</div></div>`;
    }
    modalHtml += `</div>`;
    return modalHtml;
  }

  // Render food table
  function renderFoodTable() {
    let table = `<div class="food-table-wrapper"><table class="food-table"><thead><tr><th>Food</th><th>👍 Like</th><th>👎 Dislike</th><th>⚠️ Disagree</th></tr></thead><tbody>`;
    
    foodItems.forEach(food => {
      const key = food.replace(/[^a-z0-9]/gi, '_');
      table += `<tr>
        <td>${food}</td>
        <td><input type="checkbox" id="food_like_${key}" data-save /></td>
        <td><input type="checkbox" id="food_dislike_${key}" data-save /></td>
        <td><input type="checkbox" id="food_disagree_${key}" data-save /></td>
      </tr>`;
    });
    table += `</tbody></table></div>`;
    return table;
  }

  // Panel definitions
  const panelsHtml = [
    // Step 0 - Patient Info
    `<div class="step-panel active-panel" id="panel_0">
      <h2 class="step-heading">Patient Information</h2>
      <div class="step-sub">Essential identifiers & contact</div>
      <div class="clinic-card">
        <div class="card-header-flex"><div class="card-icon">👤</div><div><h2>Personal details</h2></div></div>
        <div class="grid-2">
          <div class="form-field"><label class="field-tag">Full name *</label><input type="text" id="p_name" placeholder="Full name"/></div>
          <div class="form-field"><label class="field-tag">Age *</label><input type="number" id="p_age" /></div>
          <div class="form-field"><label class="field-tag">Email</label><input type="email" id="p_email"/></div>
          <div class="form-field"><label class="field-tag">Phone</label><input type="tel" id="p_tel"/></div>
          <div class="full-width form-field"><label class="field-tag">Address</label><textarea id="p_address" rows="2"></textarea></div>
          <div class="form-field"><label class="field-tag">Occupation</label><input id="p_occupation"/></div>
          <div class="form-field"><label class="field-tag">Referred by</label><input id="p_reference"/></div>

  // PDF Generation
  async function generatePdfDocument() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
    const data = gatherAllData();
    let y = 20;
    const marginX = 16;
    const maxWidth = 180;
    
    doc.setFillColor(26, 74, 63); doc.rect(0, 0, 210, 28, 'F');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(255, 215, 160);
    doc.text('Mangalmurti Clinic – Complete Case Sheet', marginX, 18);
    doc.setFontSize(9); doc.setTextColor(220, 220, 210);
    doc.text(`Patient: ${data.p_name || '—'}  |  Record Date: ${data.p_date || new Date().toLocaleDateString()}`, marginX, 26);
    doc.setTextColor(0, 0, 0);
    y = 38;
    
    function addText(title, content, yPos) {
      if (!content) return yPos;
      doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(44, 74, 62);
      doc.text(title, marginX, yPos);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(50, 50, 50);
      const lines = doc.splitTextToSize(content, maxWidth);
      lines.forEach(l => { yPos += 5; doc.text(l, marginX + 2, yPos); });
      return yPos + 4;
    }
    
    y = addText('Chief Complaint', data.c_chief, y);
    y = addText('Origin & Effect', (data.c_origin || '') + ' | ' + (data.c_effect || ''), y);
    y = addText('Past / Family History', (data.c_past || '') + ' | ' + (data.c_family || ''), y);
    
    const betterMods = allModalityItems.filter(it => getModalityValue(it) === 'Better').slice(0, 12);
    const worseMods = allModalityItems.filter(it => getModalityValue(it) === 'Worse').slice(0, 12);
    if (betterMods.length) y = addText('Better from', betterMods.join(', '), y);
    if (worseMods.length) y = addText('Worse from', worseMods.join(', '), y);
    y = addText('Personality & Emotions', data.m_personality + (data.m_q1 ? ' | Upsets: ' + data.m_q1 : ''), y);
    y = addText('Sleep features', (data.s_q22 || '') + ' | ' + (data.sl_snore ? 'Snoring ' : ''), y);
    
    if (y > 260) doc.addPage();
    doc.setFontSize(8); doc.setTextColor(100, 100, 100);
    doc.text('Generated by Mangalmurti Clinic System', marginX, 285);
    doc.save(`Mangalmurti_Case_${data.p_name || 'patient'}.pdf`);
  }

  // Build step tabs
  function buildStepTabs() {
    const container = document.getElementById('stepTabsContainer');
    if (!container) return;
    container.innerHTML = '';
    const stepNames = ['Patient Info', 'Complaints', 'Modalities', 'Diet & Appetite', 'Mind & Personality', 'Sleep & Dreams', 'Review & PDF'];
    
    stepNames.forEach((name, idx) => {
      const btn = document.createElement('button');
      btn.className = 'step-tab';
      if (idx === 0) btn.classList.add('active');
      btn.innerHTML = `<span class="step-number">${idx + 1}</span><span>${name}</span>`;
      btn.onclick = () => goToStep(idx);
      container.appendChild(btn);
    });
  }

  // Initialize app
  function init() {
    const container = document.getElementById('panelsContainer');
    if (container) container.innerHTML = panelsHtml.join('');
    
    buildStepTabs();
    
    // Render modality panel
    const modTarget = document.getElementById('modalitiesRenderTarget');
    if (modTarget) modTarget.innerHTML = renderModalityPanel();
    
    // Render food table
    const foodTarget = document.getElementById('foodTableTarget');
    if (foodTarget) foodTarget.innerHTML = renderFoodTable();
    
    // Attach modality click events
    document.querySelectorAll('.mod-badge').forEach(badge => {
      badge.addEventListener('click', (e) => {
        const item = badge.dataset.moditem;
        const val = badge.dataset.modval;
        if (item) {
          saveModalityValue(item, val);
          const parent = badge.closest('.mod-options');
          if (parent) {
            parent.querySelectorAll('.mod-badge').forEach(b => {
              b.classList.remove('selected-better', 'selected-worse', 'selected-neutral');
            });
          }
          badge.classList.add(`selected-${val.toLowerCase().replace(' ', '')}`);
        }
      });
    });
    
    populateFromStorage();
    attachSaveEvents();
    
    // Set default date
    const dateInput = document.getElementById('p_date');
    if (dateInput && !getField('p_date')) {
      dateInput.value = new Date().toLocaleDateString('en-IN');
      saveField('p_date', dateInput.value);
    }
    
    // PDF button
    const pdfBtn = document.getElementById('pdfDownloadBtn');
    if (pdfBtn) pdfBtn.addEventListener('click', generatePdfDocument);
    
    updateProgress();
    updateTabs();
  }
  
  // Start the app
  init();
</script>
